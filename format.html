<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0    ">
    <title>My First Page</title>
</head>
<body>

<!--Formatting Tags-->

    <b>bold text</b>
    <br><br>
    <i>italic text</i>
    <br><br>
    <u>underlined text</u>
    <br><br>
    <s>strikethrough text</s>
    <br><br>
    <mark>highlighted text</mark>
    <br><br>
    <small>small text</small>
    <br><br>
    <sub>subscript text</sub>
    <br><br>
    <sup>superscript text</sup>

    <br><br>
    <br><br>

    <hr>

    <big>big text</big>
    <br><br>
    <small>small text</small>
    <br><br>

    <!-- 
    the "<hr>" tag: it creates a horizontal rule
    Also helps to separate sections of a page 
    -->

    <hr>
    <p>This is a paragraph.</p>

    <br><br>
    <br><br>

    <!-- 
    subscript and superscript:
    subscript: text that appears slightly below the normal line of text (e.g., H₂O)
    superscript: text that appears slightly above the normal line of text (e.g., E=mc²) 
    -->
           <hr>
           
    <p>H<sub>2</sub>O</p>
    <p>E=mc<sup>2</sup></p>

</body>
</html>
