    <!--
    The "<a>" tag, also known as the anchor tag, is used to create hyperlinks in HTML. It allows you to link to other web pages, files, email addresses, or specific sections within the same page. The "href" attribute is used to specify the destination of the link. When a user clicks on the link, they will be directed to the specified URL or location.
     -->

     <a href="https://www.google.com" target="main"> <img src="Google.png" alt="Google" height = "100"></a>


    <hr>

    <a href="https://www.google.com" target="main">Google</a>
    <br>
    <br>
    <a href="https://code.visualstudio.com/download" target="main">Download VS Code</a>
    <br>
    <br>
    <a href="/welcome/welcomepage.html" target="main">Go to Welcome Page</a>

    <hr>

    <!--
    The "target" attribute in the "<a>" tag specifies where to open the linked document. The value "_blank" opens the link in a new tab or window, while "_self" opens the link in the same tab or window. You can also specify a named target to open the link in a specific frame or window.
     -->    

    <a href="https://www.google.com" target="main">Google</a>
