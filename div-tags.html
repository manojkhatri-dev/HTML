<!--Div Tags-->
<div class="container">
  <h1>Div Tags</h1>
  <p>This is a paragraph inside a div tag.</p>
  <div class="nested-div">
    <p>This is a nested div inside the main div.</p>
  </div>
</div>

<!-- 
Uses of div tags:
    Div tags are used to group HTML elements together and apply styles or manipulate them with JavaScript.
    Div tags can be used to create sections of a webpage, such as headers, footers, and content areas.
    Div tags can be nested inside each other to create more complex layouts.
    Div tags can be used to create a container for other elements, such as images, text, or forms.
    Div tags can be used to create a layout for a webpage, such as a grid or a flexbox layout.
    Div tags can be used to create a responsive design for a webpage, allowing it to adapt to different screen sizes and devices.
 -->


 <!--

    <address>: It is used to define contact information for the author or owner of a document or an article. It typically contains information such as the name, email address, physical address, and phone number of the person or organization.

    <article>: It is used to define a self-contained piece of content that could be distributed independently, such as a blog post, news article, or forum post.

    <aside>: It is used to define content that is tangentially related to the main content of a webpage, such as a sidebar with additional information, advertisements, or links to related articles.

    <blockquote>: It is used to define a section of content that is quoted from another source. It typically contains a citation or reference to the original source of the quote.

    <canvas>: It is used to define a container for graphics, such as images, charts, or animations, that can be drawn using JavaScript.

    <dd>: It is used to define a description or definition of a term in a description list.

    <div>: It is a generic container element that is used to group together other HTML elements. It does not have any semantic meaning on its own, but it can be styled using CSS to create a specific layout or design.

    <dl>: It is used to define a description list, which is a list of terms and their corresponding descriptions.

    <dt>: It is used to define a term in a description list.

    <fieldset>: It is used to group related elements in a form, such as input fields, checkboxes, and radio buttons.

    <figcaption>: It is used to define a caption or description for a figure element, which typically contains an image or other media.

    <figure>: It is used to define a self-contained piece of content, such as an image, diagram, or code snippet, that is typically referenced in the main content of a webpage.

    <footer>: It is used to define the footer of a webpage, which typically contains information such as copyright information, links to terms of service, and contact information.

    <form>: It is used to define an HTML form for user input, which can include various types of input fields, such as text boxes, checkboxes, radio buttons, and submit buttons.

    <h1>-<h6>: These tags are used to define headings of different levels, with <h1> being the highest level and <h6> being the lowest level.

    <hr>: It is used to define a thematic break or horizontal rule in a webpage, which can be used to separate different sections of content.

    <ol>: It is used to define an ordered list, which is a list of items that are numbered or lettered.

    <p>: It is used to define a paragraph of text.

    <summary>: It is used to define a summary or caption for a details element, which can be used to create collapsible content.

    <table>: It is used to define a table of data, which can include rows and columns of information.

    <tbody>: It is used to group the body content of a table, which typically contains the data rows.

    <td>: It is used to define a cell in a table, which can contain text, images, or other content.

    <tfoot>: It is used to group the footer content of a table, which typically contains summary information or totals.

    <th>: It is used to define a header cell in a table, which typically contains the column or row headings.

    <thead>: It is used to group the header content of a table, which typically contains the column headings.

    <time>: It is used to define a specific time or date, which can be machine-readable and can be used for various purposes, such as scheduling events or displaying timestamps.

    <title>: It is used to define the title of a webpage, which is displayed in the browser's title bar or tab and is also used by search engines to index the page.
